# New-API Docker Compose Configuration
#
# 生产部署约定：
# - 真实变量放在服务器本地 `.env`
# - 本文件保留当前 compose 结构，只把实际运行需要的环境键显式收敛到 `environment`

services:
  new-api:
    image: ${NEW_API_IMAGE:-ghcr.io/mxyhi/new-api:main}
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "${NEW_API_PORT:-3000}:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - SQL_DSN=${SQL_DSN:-postgresql://root:123456@postgres:5432/new-api} # ⚠️ IMPORTANT: Change the password in production!
#      - SQL_DSN=${SQL_DSN:-root:123456@tcp(mysql:3306)/new-api}  # Point to the mysql service, uncomment if using MySQL
      - REDIS_CONN_STRING=${REDIS_CONN_STRING:-redis://:${REDIS_PASSWORD:-123456}@${REDIS_HOST:-redis}:${REDIS_PORT:-6379}} # ⚠️ IMPORTANT: Change the password in production!
      - TZ=${TZ:-Asia/Shanghai}
      - ERROR_LOG_ENABLED=${ERROR_LOG_ENABLED:-true} # 是否启用错误日志记录 (Whether to enable error log recording)
      - BATCH_UPDATE_ENABLED=${BATCH_UPDATE_ENABLED:-true}  # 是否启用批量更新 (Whether to enable batch update)
      - NODE_NAME=${NODE_NAME:-new-api-node-1}  # 节点名称，用于审计日志中标识节点身份；多节点/容器部署时建议设置 (Node name used in audit logs; recommended when running multiple instances or in containers)
      - CLARITY_PROJECT_ID=${CLARITY_PROJECT_ID:-}
#      - SESSION_SECRET=${SESSION_SECRET}  # 多机部署时启用
#      - CRYPTO_SECRET=${CRYPTO_SECRET}  # 如需与 SESSION_SECRET 分离可启用
#      - STREAMING_TIMEOUT=${STREAMING_TIMEOUT:-300}  # 流模式无响应超时时间
#      - SYNC_FREQUENCY=${SYNC_FREQUENCY:-60}  # 如需定期同步数据库可启用
#      - GOOGLE_ANALYTICS_ID=${GOOGLE_ANALYTICS_ID}  # Google Analytics 的测量 ID
#      - UMAMI_WEBSITE_ID=${UMAMI_WEBSITE_ID}  # Umami 网站 ID
#      - UMAMI_SCRIPT_URL=${UMAMI_SCRIPT_URL}  # Umami 脚本 URL

    depends_on:
      - redis
      - postgres
#      - mysql  # Uncomment if using MySQL
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:latest
    container_name: redis
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-123456}"]  # ⚠️ IMPORTANT: Change this password in production!
    networks:
      - new-api-network

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-root}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-new-api}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - new-api-network
#    ports:
#      - "5432:5432"  # Uncomment if you need to access PostgreSQL from outside Docker

#  mysql:
#    image: mysql:8.2
#    container_name: mysql
#    restart: always
#    environment:
#      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
#      MYSQL_DATABASE: ${MYSQL_DATABASE:-new-api}
#    volumes:
#      - mysql_data:/var/lib/mysql
#    networks:
#      - new-api-network
#    ports:
#      - "3306:3306"  # Uncomment if you need to access MySQL from outside Docker

volumes:
  pg_data:
#  mysql_data:

networks:
  new-api-network:
    driver: bridge
