name: Publish alpha Docker image to GHCR

on:
  push:
    branches:
      - alpha
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (default: alpha)"
        required: false
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image_name: ${{ steps.vars.outputs.image_name }}
      commit_sha: ${{ steps.vars.outputs.commit_sha }}
      version_tag: ${{ steps.vars.outputs.version_tag }}
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Derive alpha version
        id: vars
        shell: bash
        run: |
          image_name="ghcr.io/${GITHUB_REPOSITORY_OWNER}/new-api"
          image_name="${image_name,,}"
          commit_sha="$(git rev-parse HEAD)"
          short_sha="${commit_sha:0:12}"
          version="alpha-$(date +'%Y%m%d')-${short_sha}"
          printf '%s\n' "$version" > VERSION
          echo "image_name=${image_name}" >> "$GITHUB_OUTPUT"
          echo "commit_sha=${commit_sha}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${version}" >> "$GITHUB_OUTPUT"

  build_per_arch:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ needs.prepare.outputs.commit_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push alpha image (${{ matrix.arch }})
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ needs.prepare.outputs.image_name }}:alpha-${{ matrix.arch }}
            ${{ needs.prepare.outputs.image_name }}:${{ needs.prepare.outputs.version_tag }}-${{ matrix.arch }}

  merge_manifest:
    needs: [prepare, build_per_arch]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge alpha manifests
        shell: bash
        run: |
          image_name="${{ needs.prepare.outputs.image_name }}"
          version_tag="${{ needs.prepare.outputs.version_tag }}"
          docker buildx imagetools create \
            -t "${image_name}:alpha" \
            "${image_name}:alpha-amd64" \
            "${image_name}:alpha-arm64"
          docker buildx imagetools create \
            -t "${image_name}:${version_tag}" \
            "${image_name}:${version_tag}-amd64" \
            "${image_name}:${version_tag}-arm64"
