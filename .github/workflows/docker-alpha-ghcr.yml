name: Publish alpha Docker image to GHCR

on:
  push:
    branches:
      - alpha
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (default: alpha)"
        required: false
        type: string

jobs:
  publish-alpha:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/new-api
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Normalize image name
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - name: Derive alpha version
        id: vars
        shell: bash
        run: |
          version="alpha-$(date +'%Y%m%d')-${GITHUB_SHA::12}"
          printf '%s\n' "$version" > VERSION
          {
            echo "version=${version}"
            echo 'tags<<EOF'
            echo "${IMAGE_NAME}:alpha"
            echo "${IMAGE_NAME}:${version}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push alpha multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.vars.outputs.tags }}
