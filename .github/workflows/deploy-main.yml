name: Deploy main to production server

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image_name: ${{ steps.meta.outputs.image_name }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
      version: ${{ steps.meta.outputs.version }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      commit_sha: ${{ steps.meta.outputs.commit_sha }}
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Prepare release metadata
        id: meta
        shell: bash
        run: |
          image_name="ghcr.io/${GITHUB_REPOSITORY_OWNER}/new-api"
          image_name="${image_name,,}"
          commit_sha="$(git rev-parse HEAD)"
          short_sha="${commit_sha:0:12}"
          version="main-${short_sha}"
          image_tag="${image_name}:${version}"
          printf '%s\n' "${version}" > VERSION
          echo "image_name=${image_name}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "commit_sha=${commit_sha}" >> "$GITHUB_OUTPUT"

  build_per_arch:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ needs.prepare.outputs.commit_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push main image (${{ matrix.arch }})
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ needs.prepare.outputs.image_name }}:main-${{ matrix.arch }}
            ${{ needs.prepare.outputs.image_name }}:${{ needs.prepare.outputs.version }}-${{ matrix.arch }}

  merge_manifest:
    needs: [prepare, build_per_arch]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge main manifests
        shell: bash
        run: |
          image_name="${{ needs.prepare.outputs.image_name }}"
          version="${{ needs.prepare.outputs.version }}"
          docker buildx imagetools create \
            -t "${image_name}:main" \
            "${image_name}:main-amd64" \
            "${image_name}:main-arm64"
          docker buildx imagetools create \
            -t "${image_name}:${version}" \
            "${image_name}:${version}-amd64" \
            "${image_name}:${version}-arm64"

  deploy:
    needs: [prepare, merge_manifest]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
      DEPLOY_USER: ${{ vars.DEPLOY_USER }}
      DEPLOY_TARGET_DIR: ${{ vars.DEPLOY_TARGET_DIR }}
      SHORT_SHA: ${{ needs.prepare.outputs.short_sha }}
      IMAGE_TAG: ${{ needs.prepare.outputs.image_tag }}
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          if [ -z "${DEPLOY_SSH_KEY}" ] || [ -z "${DEPLOY_HOST}" ] || [ -z "${DEPLOY_USER}" ] || [ -z "${DEPLOY_TARGET_DIR}" ]; then
            echo "DEPLOY_SSH_KEY, DEPLOY_HOST, DEPLOY_USER, DEPLOY_TARGET_DIR are required"
            exit 1
          fi
          install -m 700 -d ~/.ssh
          printf '%s\n' "${DEPLOY_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${DEPLOY_SSH_PORT:-22}" "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Upload deploy assets to remote host
        env:
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          ssh_port="${DEPLOY_SSH_PORT:-22}"
          remote_staging_dir="/tmp/new-api-deploy-${SHORT_SHA}"
          mkdir -p dist
          tar -czf "dist/deploy-assets-${SHORT_SHA}.tgz" docker-compose.yml start.sh ci-deploy.sh
          ssh -p "${ssh_port}" "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${remote_staging_dir}'"
          scp -P "${ssh_port}" "dist/deploy-assets-${SHORT_SHA}.tgz" "${DEPLOY_USER}@${DEPLOY_HOST}:${remote_staging_dir}/"

      - name: Deploy on remote host
        env:
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          ssh_port="${DEPLOY_SSH_PORT:-22}"
          ssh -p "${ssh_port}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "SHORT_SHA='${SHORT_SHA}' IMAGE_TAG='${IMAGE_TAG}' TARGET_DIR='${DEPLOY_TARGET_DIR}' bash -s" <<'EOF'
          set -euo pipefail
          staging_dir="/tmp/new-api-deploy-${SHORT_SHA}"
          asset_dir="${staging_dir}/assets"
          mkdir -p "${TARGET_DIR}" "${TARGET_DIR}/data" "${TARGET_DIR}/logs" "${asset_dir}"
          tar -xzf "${staging_dir}/deploy-assets-${SHORT_SHA}.tgz" -C "${asset_dir}"
          install -m 644 "${asset_dir}/docker-compose.yml" "${TARGET_DIR}/docker-compose.yml"
          install -m 755 "${asset_dir}/start.sh" "${TARGET_DIR}/start.sh"
          install -m 755 "${asset_dir}/ci-deploy.sh" "${TARGET_DIR}/ci-deploy.sh"
          cd "${TARGET_DIR}"
          ./ci-deploy.sh --image-tag "${IMAGE_TAG}" --pull --wait
          rm -rf "${staging_dir}"
          EOF

      - name: Cleanup remote staging
        if: always()
        env:
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          if [ -z "${DEPLOY_HOST}" ] || [ -z "${DEPLOY_USER}" ]; then
            exit 0
          fi
          ssh_port="${DEPLOY_SSH_PORT:-22}"
          ssh -p "${ssh_port}" "${DEPLOY_USER}@${DEPLOY_HOST}" "rm -rf '/tmp/new-api-deploy-${SHORT_SHA}'" || true
