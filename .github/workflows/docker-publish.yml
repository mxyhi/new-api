name: Publish Docker image to GHCR

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch or tag)"
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/new-api
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Normalize image name
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - name: Derive tags
        id: vars
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::12}"
          tags=()
          latest=false

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
            printf '%s\n' "$tag" > VERSION
            tags+=("${IMAGE_NAME}:${tag}")
            if [[ ! "$tag" =~ (alpha|beta|rc) ]]; then
              tags+=("${IMAGE_NAME}:latest")
              latest=true
            fi
          else
            printf 'main-%s\n' "$short_sha" > VERSION
            tags+=("${IMAGE_NAME}:main")
            tags+=("${IMAGE_NAME}:main-${short_sha}")
          fi

          {
            echo 'tags<<EOF'
            printf '%s\n' "${tags[@]}"
            echo 'EOF'
            echo "latest=${latest}"
            echo "short_sha=${short_sha}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=main-${{ steps.vars.outputs.short_sha }},enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.vars.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
